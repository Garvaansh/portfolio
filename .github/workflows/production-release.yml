name: Production Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

# Queues concurrent releases sequentially rather than cancelling,
# ensuring the deployment history maps exactly to the tag order.
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy Production Release
    runs-on: ubuntu-latest
    environment:
      name: production

    permissions:
      contents: read

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate SemVer Tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid SemVer tag: $TAG"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        # Required for managing modern Yarn (v2+) environments seamlessly
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Lint Source Code
        run: yarn lint

      - name: Type Check
        run: yarn typecheck

      # Note: Standalone `yarn build` removed to prevent double-execution
      
      - name: Install Vercel CLI
        run: npm install --global vercel@39.1.0

      - name: Pull Vercel Environment Information
        run: |
          vercel pull \
            --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Generate Production Artifacts
        # Executes the internal framework build command based on the Vercel project configuration
        run: |
          vercel build \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Production
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy \
            --prebuilt \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }})
            
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: Publish Deployment Summary
        run: |
          echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Version: $GITHUB_REF_NAME" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: $GITHUB_SHA" >> $GITHUB_STEP_SUMMARY
          echo "- Deployment URL: ${{ steps.deploy.outputs.deployment_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Success" >> $GITHUB_STEP_SUMMARY
