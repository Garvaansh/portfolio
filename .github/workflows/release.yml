name: Production Release Pipeline

concurrency:
  group: production
  cancel-in-progress: false

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: # Critical addition: Allows testing the Vercel deployment sequence without minting fake release tags

jobs:
  deploy-production:
    name: Deploy Production Release
    runs-on: ubuntu-latest
    environment:
      name: production

    permissions:
      contents: read

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate SemVer Tag
        # Bypasses regex validation if the workflow was triggered manually (workflow_dispatch) instead of via tag push
        if: github.event_name == 'push'
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid SemVer tag: $TAG"
            exit 1
          fi

      - name: Initialize Corepack
        run: corepack enable

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Verify Package Manager State
        run: yarn --version

      - name: Resolve Dependencies
        run: yarn install --immutable

      - name: Install Vercel CLI
        run: npm install --global vercel@39.1.0

      - name: Synchronize Cloud Environment
        run: |
          vercel pull \
            --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Compile Production Artifacts
        run: |
          vercel build \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Execute Deployment
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy \
            --prebuilt \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }})
            
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: Publish Deployment Summary
        run: |
          echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: $GITHUB_SHA" >> $GITHUB_STEP_SUMMARY
          echo "- Deployment URL: ${{ steps.deploy.outputs.deployment_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Success" >> $GITHUB_STEP_SUMMARY   
